<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#8c8c8c"/>

  <!-- Círculo -->
  <circle cx="400" cy="230" r="160" fill="none" stroke="#ffffff" stroke-width="4"/>

  <!-- Corpo da câmera -->
  <rect x="305" y="185" width="190" height="130" rx="8" ry="8" fill="none" stroke="#ffffff" stroke-width="6"/>

  <!-- Topo da câmera (flash/visor) -->
  <path d="M 360 185 L 360 160 L 440 160 L 440 185" fill="none" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>

  <!-- Lente (círculo externo) -->
  <circle cx="400" cy="250" r="45" fill="none" stroke="#ffffff" stroke-width="6"/>
  <!-- Lente (círculo interno) -->
  <circle cx="400" cy="250" r="28" fill="none" stroke="#ffffff" stroke-width="4"/>

  <!-- Linha diagonal cortando -->
  <line x1="260" y1="90" x2="530" y2="360" stroke="#ffffff" stroke-width="6"/>

  <!-- Texto -->
  <text x="400" y="470" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="2">Sem imagem</text>
</svg>
